<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Claude</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface-2: #242424;
    --border: #333;
    --text: #e4e4e4;
    --text-muted: #888;
    --accent: #c084fc;
    --accent-hover: #a855f7;
    --user-msg: #2a1a4a;
    --bot-msg: #1a1a1a;
    --danger: #ef4444;
    --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .model-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--surface-2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  #clearBtn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: 0.15s;
  }
  #clearBtn:hover { background: var(--surface-2); color: var(--danger); border-color: var(--danger); }

  #chatContainer {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  #chatContainer::-webkit-scrollbar { width: 6px; }
  #chatContainer::-webkit-scrollbar-track { background: transparent; }
  #chatContainer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { flex-direction: row-reverse; }
  .msg .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .msg.user .avatar { background: var(--accent); color: #000; }
  .msg.assistant .avatar { background: var(--surface-2); color: var(--accent); border: 1px solid var(--border); }
  .msg .bubble {
    padding: 10px 16px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 14px;
    max-width: 85%;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user .bubble {
    background: var(--user-msg);
    border: 1px solid var(--accent);
    border-top-right-radius: 4px;
  }
  .msg.assistant .bubble {
    background: var(--bot-msg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .msg .bubble p { margin-bottom: 8px; }
  .msg .bubble p:last-child { margin-bottom: 0; }
  .msg .bubble code {
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
  }
  .msg .bubble pre {
    background: var(--surface-2);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    border: 1px solid var(--border);
  }
  .msg .bubble pre code {
    background: none;
    padding: 0;
    font-size: 13px;
  }

  #typingIndicator {
    display: none;
    align-items: center;
    gap: 12px;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
    padding-left: 44px;
    animation: fadeIn 0.2s ease;
  }
  #typingIndicator.visible { display: flex; }
  .typing-dots { display: flex; gap: 4px; }
  .typing-dots span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.4s infinite ease-in-out both;
  }
  .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
  .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); } 40% { transform: scale(1); } }

  #inputArea {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    background: var(--surface);
    flex-shrink: 0;
  }
  #inputWrapper {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #messageInput {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font);
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 200px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }
  #messageInput:focus { border-color: var(--accent); }
  #messageInput::placeholder { color: var(--text-muted); }

  #sendBtn {
    background: var(--accent);
    border: none;
    color: #000;
    width: 48px;
    height: 48px;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.15s;
    flex-shrink: 0;
  }
  #sendBtn:hover { background: var(--accent-hover); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  #sendBtn svg { width: 20px; height: 20px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    text-align: center;
    gap: 12px;
  }
  .empty-state svg { width: 48px; height: 48px; opacity: 0.4; }
  .empty-state h2 { font-size: 18px; font-weight: 500; }
  .empty-state p { font-size: 13px; max-width: 360px; }

  @media (max-width: 600px) {
    header { padding: 10px 14px; }
    #chatContainer { padding: 14px; }
    #inputArea { padding: 12px 14px; }
    .msg .bubble { max-width: 90%; font-size: 13px; }
  }

  .stop-btn {
    background: var(--danger);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    display: none;
    transition: 0.15s;
  }
  .stop-btn:hover { opacity: 0.85; }
  .stop-btn.visible { display: inline-flex; align-items: center; gap: 6px; }
</style>
</head>
<body>

<header>
  <h1>Chat Claude</h1>
  <div class="header-actions">
    <span class="model-badge" id="modelBadge">anthropic/claude-sonnet-4</span>
    <button id="clearBtn" title="Clear conversation">Clear</button>
  </div>
</header>

<div id="chatContainer">
  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
    <h2>Chat with Claude</h2>
    <p>Send a message to start a conversation. Responses stream in real time.</p>
  </div>
</div>

<div id="typingIndicator">
  <div class="typing-dots"><span></span><span></span><span></span></div>
  <span style="font-size: 12px; color: var(--text-muted);">Claude is thinking...</span>
</div>

<div id="inputArea">
  <div id="inputWrapper">
    <textarea id="messageInput" rows="1" placeholder="Type a message..."></textarea>
    <button id="sendBtn" disabled aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div>

<script>
const chatContainer = document.getElementById('chatContainer');
const emptyState = document.getElementById('emptyState');
const input = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const clearBtn = document.getElementById('clearBtn');
const typingIndicator = document.getElementById('typingIndicator');

let abortController = null;
let messages = [];

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
}

input.addEventListener('input', autoResize);

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

input.addEventListener('input', () => {
  sendBtn.disabled = !input.value.trim();
});

sendBtn.addEventListener('click', sendMessage);
clearBtn.addEventListener('click', clearChat);

function clearChat() {
  if (abortController) {
    abortController.abort();
    abortController = null;
  }
  messages = [];
  document.querySelectorAll('.msg').forEach(el => el.remove());
  emptyState.style.display = 'flex';
  updateStopBtn();
}

function addMessage(role, content) {
  emptyState.style.display = 'none';

  const existing = document.querySelector(`.msg[data-id="${messages.length}"]`);
  if (existing) {
    const bubble = existing.querySelector('.bubble');
    bubble.textContent = content;
    return existing;
  }

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.dataset.id = messages.length;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'U' : 'C';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;

  div.appendChild(role === 'user' ? bubble : avatar);
  div.appendChild(role === 'user' ? avatar : bubble);

  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return div;
}

function updateStopBtn() {
  let btn = document.getElementById('stopBtn');
  if (abortController) {
    if (!btn) {
      btn = document.createElement('button');
      btn.id = 'stopBtn';
      btn.className = 'stop-btn visible';
      btn.innerHTML = 'Stop';
      btn.onclick = () => { abortController?.abort(); };
      document.querySelector('.header-actions').appendChild(btn);
    }
    btn.classList.add('visible');
  } else {
    if (btn) btn.classList.remove('visible');
  }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || sendBtn.disabled) return;

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  messages.push({ role: 'user', content: text });
  addMessage('user', text);

  typingIndicator.classList.add('visible');

  abortController = new AbortController();
  updateStopBtn();

  const assistantDiv = addMessage('assistant', '');

  try {
    const resp = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
      signal: abortController.signal,
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      assistantDiv.querySelector('.bubble').textContent = `Error: ${err.error || 'Unknown error'}`;
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullContent = '';
    let inThinking = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const parsed = JSON.parse(data);
            if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
              fullContent += parsed.delta.text;
              assistantDiv.querySelector('.bubble').textContent = fullContent;
              chatContainer.scrollTop = chatContainer.scrollHeight;
            }
          } catch {}
        }
      }
    }

    if (buffer.startsWith('data: ')) {
      const data = buffer.slice(6).trim();
      if (data !== '[DONE]') {
        try {
          const parsed = JSON.parse(data);
          if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
            fullContent += parsed.delta.text;
          }
        } catch {}
      }
    }

    assistantDiv.querySelector('.bubble').textContent = fullContent || '(empty response)';
    messages.push({ role: 'assistant', content: fullContent });
  } catch (err) {
    if (err.name === 'AbortError') {
      assistantDiv.querySelector('.bubble').textContent = '(stopped)';
    } else {
      assistantDiv.querySelector('.bubble').textContent = `Error: ${err.message}`;
    }
  } finally {
    typingIndicator.classList.remove('visible');
    abortController = null;
    updateStopBtn();
    sendBtn.disabled = !input.value.trim();
  }
}
</script>
</body>
</html>
